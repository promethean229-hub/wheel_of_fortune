<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо фортуни - Super Colorful</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-gradient: linear-gradient(135deg, #f43f5e 0%, #fb923c 100%);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.15) 0px, transparent 50%);
            overflow: hidden;
            height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
        }

        h1, h2, .font-brand { font-family: 'Montserrat', sans-serif; }

        /* Адаптивна зона колеса */
        .game-wheel-area {
            position: relative;
            width: min(70vw, 65vh); /* Зменшено для кращого вписування в екран ноутбука */
            height: min(70vw, 65vh);
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            padding: 15px;
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.2);
        }

        .wheel-container { 
            position: relative; 
            width: 100%;
            height: 100%;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            z-index: 10;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #ffffff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .wheel-marker {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 65px;
            background: #ffffff;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 50;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
        }
        .wheel-marker::after {
            content: '';
            position: absolute;
            top: 4px; left: 8px; right: 8px; bottom: 22px;
            background: #ef4444;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        .star-on { color: #fbbf24; filter: drop-shadow(0 0 5px #fbbf24); }
        .star-off { color: rgba(255,255,255,0.1); }

        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .winner-card {
            background: white;
            border-radius: 3rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            color: #1e293b;
            box-shadow: 0 0 100px rgba(99, 102, 241, 0.6);
            border: 10px solid #6366f1;
        }

        .btn-gradient {
            background: var(--primary-gradient);
            box-shadow: 0 6px 0 #4338ca;
            transition: all 0.2s;
        }
        .btn-gradient:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #4338ca;
        }
        .btn-gradient:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Модалка -->
    <div id="modal-overlay">
        <div class="winner-card">
            <p class="text-indigo-600 font-black uppercase tracking-widest text-lg mb-2">Зірка уроку:</p>
            <h2 id="winner-name" class="text-4xl md:text-5xl font-black mb-8 leading-tight break-words px-2">Ім'я</h2>
            
            <div class="flex flex-col gap-4">
                <button onclick="handleAction('go')" class="btn-gradient w-full text-white py-6 rounded-2xl font-black text-3xl hover:brightness-110 active:scale-95">
                    ВІДПОВІДАЄ! 🎓
                </button>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleAction('reject')" class="bg-slate-200 text-slate-700 py-4 rounded-xl font-black text-xl hover:bg-slate-300 border-b-4 border-slate-400">
                        Ще раз 🔄
                    </button>
                    <button onclick="handleAction('absent')" class="bg-red-50 text-red-400 py-4 rounded-xl font-black text-xl hover:bg-red-100 border-b-4 border-red-200">
                        Відсутній 👤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Основний додаток -->
    <div id="app" class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Шапка -->
        <div id="header" class="hidden flex justify-between items-center px-6 py-4 bg-white/5 border-b border-white/10 shrink-0">
            <button onclick="location.reload()" class="font-black text-lg text-white/40 hover:text-indigo-400">← КЛАСИ</button>
            <h1 id="class-title" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Клас</h1>
            <div class="w-20"></div>
        </div>

        <!-- Вибір класу -->
        <div id="menu-view" class="flex-1 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
            <h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tighter">
                <span class="text-white">WHEEL</span><br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">FORTUNE</span>
            </h1>
            <p class="text-xl text-slate-400 mb-10">Оберіть клас</p>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6 w-full max-w-5xl" id="class-grid"></div>
        </div>

        <!-- Гра -->
        <div id="game-view" class="hidden flex-1 flex flex-row overflow-hidden p-4 md:p-6 gap-4">
            <!-- Ліва панель (Черга) -->
            <div class="w-64 glass-panel p-4 flex flex-col shrink-0">
                <h3 class="text-sm font-black text-indigo-400 uppercase mb-4 tracking-widest text-center">Черга (<span id="count-pending">0</span>)</h3>
                <div id="list-pending" class="flex-1 overflow-y-auto space-y-2 custom-scroll text-sm"></div>
            </div>

            <!-- Центр (Колесо) -->
            <div class="flex-1 flex flex-col items-center justify-center min-w-0">
                <div class="game-wheel-area">
                    <div class="wheel-marker"></div>
                    <div class="wheel-container" id="wheel-wrapper">
                        <canvas id="wheel-canvas"></canvas>
                    </div>
                </div>
                
                <button id="spin-btn" onclick="spinWheel()" class="btn-gradient text-white px-12 md:px-20 py-5 rounded-full font-black text-2xl md:text-4xl mt-4 z-20">
                    КРУТИТИ
                </button>
            </div>

            <!-- Права панель (Зірки) -->
            <div class="w-80 glass-panel p-4 flex flex-col shrink-0">
                <h3 class="text-sm font-black text-emerald-400 uppercase mb-4 tracking-widest text-center">Успіхи (<span id="count-done">0</span>)</h3>
                <div id="list-done" class="flex-1 overflow-y-auto space-y-4 custom-scroll pr-1"></div>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1_pq4ymribVOGorbZTH6D9vBt1CZwtdtLLIR6dpmgync';
        const CLASSES = ["7-А", "7-Б", "7-В", "7-Г", "7-Ж", "8-А", "8-Д", "10-А"];
        const COLORS = ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#a855f7'];

        let state = {
            currentClass: '',
            pending: [],
            done: [],
            isSpinning: false,
            rotation: 0,
            currentWinner: null
        };

        let audioCtx;
        let activeTickInterval = null;

        function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) {}
        }

        function playTickSound() {
            if (!audioCtx || audioCtx.state !== 'running') return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch(e) {}
        }

        // Генерація кнопок вибору класу
        const grid = document.getElementById('class-grid');
        CLASSES.forEach(c => {
            const btn = document.createElement('button');
            btn.className = "bg-white/10 border border-white/20 p-6 rounded-3xl shadow-xl hover:bg-white/20 hover:scale-105 transition-all font-black text-2xl text-white";
            btn.innerText = c;
            btn.onclick = () => {
                initAudio();
                loadClass(c);
            };
            grid.appendChild(btn);
        });

        async function loadClass(className) {
            state.currentClass = className;
            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('header').classList.remove('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('class-title').innerText = className;

            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(className)}`;
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w\W]*)\);/)[1]);
                state.pending = json.table.rows
                    .map(r => r.c[0]?.v)
                    .filter(v => v && !["Ім'я", "ПІБ", "Учень", "Прізвище"].some(forbidden => v.includes(forbidden)));
                updateUI();
            } catch (e) {
                state.pending = ["Помилка"];
                updateUI();
            }
        }

        function updateUI() {
            const pList = document.getElementById('list-pending');
            pList.innerHTML = state.pending.map(name => `
                <div class="bg-white/5 p-3 rounded-xl text-sm font-bold text-white/80 border border-white/5 truncate">${name}</div>
            `).join('');
            document.getElementById('count-pending').innerText = state.pending.length;

            const dList = document.getElementById('list-done');
            dList.innerHTML = state.done.slice().reverse().map(s => `
                <div class="bg-white/10 p-4 rounded-2xl border border-white/10 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-white text-sm truncate w-40">${s.name}</span>
                        <div class="flex gap-2">
                            <button onclick="changeStar('${s.name}', -1)" class="bg-white/10 w-8 h-8 rounded-lg flex items-center justify-center text-white/50">-</button>
                            <button onclick="changeStar('${s.name}', 1)" class="bg-indigo-500 w-8 h-8 rounded-lg flex items-center justify-center text-white">+</button>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        ${Array.from({length: 12}).map((_, i) => `
                            <span class="text-lg ${s.stars > i ? 'star-on' : 'star-off'}">★</span>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('count-done').innerText = state.done.length;

            drawWheel();
        }

        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const size = 1200;
            canvas.width = size;
            canvas.height = size;

            if (state.pending.length === 0) return;

            const slice = (Math.PI * 2) / state.pending.length;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 20;

            state.pending.forEach((name, i) => {
                const angle = i * slice;
                ctx.beginPath();
                ctx.fillStyle = COLORS[i % COLORS.length];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + slice);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + slice / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 32px Inter";
                const displayName = name.length > 20 ? name.substring(0, 18) + '..' : name;
                ctx.fillText(displayName, radius - 60, 10);
                ctx.restore();
            });
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
        }

        function spinWheel() {
            initAudio();
            const spinBtn = document.getElementById('spin-btn');
            
            if (state.isSpinning || state.pending.length === 0) return;

            if (activeTickInterval) clearInterval(activeTickInterval);
            
            state.isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.innerText = "ЧЕКАЙТЕ...";

            const extraDegrees = 3600 + Math.random() * 3600;
            state.rotation += extraDegrees;
            
            const wrapper = document.getElementById('wheel-wrapper');
            wrapper.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
            wrapper.style.transform = `rotate(${state.rotation}deg)`;

            let lastTickSlice = -1;
            const sliceDeg = 360 / state.pending.length;

            activeTickInterval = setInterval(() => {
                const style = window.getComputedStyle(wrapper);
                const matrix = new DOMMatrixReadOnly(style.transform);
                const currentAngle = Math.atan2(matrix.m12, matrix.m11) * (180 / Math.PI);
                const normalizedAngle = (360 - (currentAngle % 360) + 270) % 360;
                const currentSlice = Math.floor(normalizedAngle / sliceDeg);
                if (currentSlice !== lastTickSlice) {
                    playTickSound();
                    lastTickSlice = currentSlice;
                }
            }, 50);

            setTimeout(() => {
                clearInterval(activeTickInterval);
                const sectorIndex = Math.floor(((360 - (state.rotation % 360)) + 270) % 360 / sliceDeg) % state.pending.length;
                state.currentWinner = state.pending[sectorIndex];
                document.getElementById('winner-name').innerText = state.currentWinner;
                document.getElementById('modal-overlay').style.display = 'flex';
            }, 5100);
        }

        window.handleAction = (type) => {
            const overlay = document.getElementById('modal-overlay');
            const spinBtn = document.getElementById('spin-btn');
            
            if (type === 'go') {
                state.done.push({ name: state.currentWinner, stars: 0 });
                state.pending = state.pending.filter(n => n !== state.currentWinner);
            } else if (type === 'absent') {
                state.pending = state.pending.filter(n => n !== state.currentWinner);
            }

            state.isSpinning = false;
            spinBtn.disabled = false;
            spinBtn.innerText = "КРУТИТИ";
            
            overlay.style.display = 'none';
            updateUI();
        }

        window.changeStar = (name, delta) => {
            const student = state.done.find(s => s.name === name);
            if (student) {
                student.stars = Math.min(12, Math.max(0, student.stars + delta));
                updateUI();
            }
        }
        
        // Автоматичне відновлення при зміні масштабу або простої
        window.addEventListener('resize', () => {
            if (!state.isSpinning && document.getElementById('modal-overlay').style.display !== 'flex') {
                const spinBtn = document.getElementById('spin-btn');
                spinBtn.disabled = false;
                spinBtn.innerText = "КРУТИТИ";
            }
        });

        setInterval(() => {
            const overlayVisible = document.getElementById('modal-overlay').style.display === 'flex';
            if (!state.isSpinning && !overlayVisible) {
                const spinBtn = document.getElementById('spin-btn');
                if (spinBtn.disabled) {
                    spinBtn.disabled = false;
                    spinBtn.innerText = "КРУТИТИ";
                }
            }
        }, 1500);
    </script>
</body>
</html>
