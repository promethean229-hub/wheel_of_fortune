<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо фортуни - Смарт-дошка</title><!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо фортуни - Смарт-дошка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            background: #f1f5f9; 
            background-image: 
                radial-gradient(at 0% 0%, hsla(223,100%,93%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(210,100%,92%,1) 0, transparent 50%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .wheel-outer-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0; 
            padding: 10px;
        }

        .wheel-container { 
            position: relative; 
            width: min(75vw, 60vh); 
            height: min(75vw, 60vh);
            max-width: 500px; 
            max-height: 500px;
            filter: drop-shadow(0 20px 40px rgba(79, 70, 229, 0.25)); 
        }

        #wheel { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 12px solid #fff; 
            position: relative; 
            overflow: hidden; 
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); 
            background: #e2e8f0;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }

        .marker { 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 45px; 
            height: 55px; 
            background: #ef4444; 
            clip-path: polygon(50% 100%, 0 0, 100% 0); 
            z-index: 30; 
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }

        .center-dot { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 18%; 
            height: 18%; 
            background: white; 
            border: 5px solid #f1f5f9; 
            border-radius: 50%; 
            z-index: 40; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: clamp(1.5rem, 4vh, 2.5rem); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .slice-label { 
            color: white; 
            font-weight: 900; 
            font-size: clamp(0.4rem, 1.4vh, 0.85rem); 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform-origin: 0% 50%; 
            width: 42%; 
            text-align: right; 
            pointer-events: none; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.8); 
            padding-right: 15px;
            white-space: nowrap;
        }

        @keyframes cardPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #global-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: none; 
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .invite-card {
            animation: cardPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            border-radius: 4rem;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 650px;
            text-align: center;
            border: 12px solid #4f46e5;
            box-shadow: 0 0 100px rgba(79, 70, 229, 0.4);
        }

        .star-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
        }

        .star-active { color: #f59e0b; filter: drop-shadow(0 0 3px rgba(245, 158, 11, 0.5)); }
        .star-inactive { color: #e2e8f0; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app-root" class="h-full w-full flex flex-col"></div>

    <!-- Модальне вікно переможця -->
    <div id="global-overlay">
        <div class="invite-card">
            <p class="text-indigo-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">До дошки запрошується</p>
            <h2 id="winner-display-name" class="text-4xl md:text-6xl font-black text-slate-800 mb-8 break-words leading-tight px-4">---</h2>
            
            <div class="flex flex-col gap-4">
                <!-- Кнопка успіху -->
                <button onclick="window.confirmStudent()" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black text-3xl hover:bg-indigo-700 transition-all shadow-xl active:scale-95 border-b-8 border-indigo-900">
                    Я ЙДУ! 🎓
                </button>
                
                <div class="grid grid-cols-2 gap-4">
                    <!-- Кнопка відмови (повернення в колесо) -->
                    <button onclick="window.rejectStudent()" class="bg-slate-200 text-slate-700 py-4 rounded-[1.5rem] font-black text-lg hover:bg-slate-300 transition-all active:scale-95 border-b-4 border-slate-400">
                        ВІДМОВЛЯЮСЯ ❌
                    </button>
                    <!-- Кнопка відсутності (просто закрити) -->
                    <button onclick="window.absentStudent()" class="bg-slate-100 text-slate-400 py-4 rounded-[1.5rem] font-black text-lg hover:bg-slate-200 transition-all active:scale-95 border-b-4 border-slate-300">
                        ВІДСУТНІЙ 👤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const SPREADSHEET_ID = '1_pq4ymribVOGorbZTH6D9vBt1CZwtdtLLIR6dpmgync'; 
        const CLASSES = ["7-А", "7-Б", "7-В", "7-Г", "7-Ж", "8-А", "8-Д", "10-А"];
        const COLORS = ['#4f46e5', '#ef4444', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4'];

        let state = {
            view: 'menu',
            selectedClass: null,
            allStudents: [],
            pendingStudents: [],
            answeredStudents: [], 
            lastWinner: null,
            isSpinning: false,
            currentRotation: 0,
            audioReady: false
        };

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => { state.audioReady = true; render(); });
            } else {
                state.audioReady = true;
            }
        }
        
        function playTick() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playWinSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.4);
            });
        }

        function render() {
            const root = document.getElementById('app-root');
            if (state.view === 'menu') {
                root.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
                        <h1 class="text-4xl md:text-6xl font-black text-slate-800 mb-2">Колесо <span class="text-indigo-600">фортуни</span></h1>
                        <p class="text-slate-400 mb-12 text-xl font-medium">Оберіть клас</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-5xl px-4">
                            ${CLASSES.map(c => `
                                <button onclick="window.selectClass('${c}')" class="bg-white p-8 rounded-[2.5rem] shadow-xl hover:shadow-indigo-200 hover:scale-105 active:scale-95 group transition-all border-b-8 border-slate-200">
                                    <div class="text-4xl mb-3">🏫</div>
                                    <div class="text-2xl font-black text-slate-700 group-hover:text-indigo-600">${c}</div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.view === 'loading') {
                root.innerHTML = `<div class="flex-1 flex items-center justify-center font-black text-2xl text-indigo-600 animate-pulse">ЗАВАНТАЖЕННЯ...</div>`;
            } else {
                root.innerHTML = `
                    <div class="flex justify-between items-center px-8 py-4 bg-white/80 border-b border-slate-200">
                        <button onclick="window.goBack()" class="bg-slate-100 px-6 py-2 rounded-xl font-black text-slate-600 hover:bg-slate-200 transition-all">← КЛАСИ</button>
                        <div class="text-center">
                            <h2 class="text-2xl font-black text-slate-800">${state.selectedClass}</h2>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${state.audioReady ? 'Звук увімкнено' : 'Натисніть будь-де для звуку'}</p>
                        </div>
                        <button onclick="window.resetProgress()" class="text-xs font-bold text-red-400 hover:text-red-600">Скинути все</button>
                    </div>

                    <div class="flex-1 flex flex-row overflow-hidden p-6 gap-6">
                        <div class="hidden xl:flex w-64 bg-white/50 rounded-[3rem] p-6 flex-col border border-white">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">У черзі: ${state.pendingStudents.length}</h3>
                            <div class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-1">
                                ${state.pendingStudents.map(n => `<div class="bg-white/80 p-3 rounded-xl text-xs font-bold text-slate-600 border border-slate-100">${n}</div>`).join('')}
                            </div>
                        </div>

                        <div class="flex-1 flex flex-col items-center justify-center">
                            <div class="wheel-outer-box">
                                <div class="wheel-container">
                                    <div class="marker"></div>
                                    <div class="center-dot">😎</div>
                                    <div id="wheel"></div>
                                </div>
                            </div>
                            <button onclick="window.spin()" id="spin-btn" ${state.pendingStudents.length === 0 ? 'disabled' : ''} 
                                class="bg-indigo-600 text-white text-4xl font-black py-6 px-24 rounded-[3rem] shadow-2xl hover:bg-indigo-700 active:scale-95 transition-all border-b-[8px] border-indigo-900 disabled:opacity-20">
                                КРУТИТИ
                            </button>
                        </div>

                        <div class="flex w-80 bg-white/50 rounded-[3rem] p-6 flex-col border border-white">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest text-right">Успіхи: ${state.answeredStudents.length}</h3>
                            <div class="flex-1 overflow-y-auto space-y-4 custom-scrollbar pr-1">
                                ${state.answeredStudents.slice().reverse().map((student) => `
                                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-indigo-50">
                                        <div class="flex justify-between items-center mb-3">
                                            <div class="text-sm font-black text-slate-700 truncate mr-2">${student.name}</div>
                                            <div class="flex gap-1.5 shrink-0">
                                                <button onclick="window.removeStar('${student.name}')" class="bg-red-500 p-1.5 rounded-lg text-white active:scale-90 transition-all">
                                                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
                                                </button>
                                                <button onclick="window.addStar('${student.name}')" class="bg-indigo-600 p-1.5 rounded-lg text-white active:scale-90 transition-all">
                                                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 12h14m-7-7v14"/></svg>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="star-grid">
                                            ${Array.from({length: 12}).map((_, i) => `
                                                <span class="text-lg ${student.stars > i ? 'star-active' : 'star-inactive'}">★</span>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
                drawWheel();
            }
        }

        // Керування модальним вікном
        window.confirmStudent = () => {
            state.answeredStudents.push({ name: state.lastWinner, stars: 0 });
            state.pendingStudents = state.pendingStudents.filter(n => n !== state.lastWinner);
            document.getElementById('global-overlay').style.display = 'none';
            render();
        };

        window.rejectStudent = () => {
            // Учень залишається в pendingStudents, просто закриваємо вікно
            document.getElementById('global-overlay').style.display = 'none';
            render();
        };

        window.absentStudent = () => {
            // Видаляємо з черги, але не додаємо в успіхи
            state.pendingStudents = state.pendingStudents.filter(n => n !== state.lastWinner);
            document.getElementById('global-overlay').style.display = 'none';
            render();
        };

        window.addStar = (name) => {
            const student = state.answeredStudents.find(s => s.name === name);
            if (student && student.stars < 12) {
                student.stars++;
                playTick(); 
                render();
            }
        };

        window.removeStar = (name) => {
            const student = state.answeredStudents.find(s => s.name === name);
            if (student && student.stars > 0) {
                student.stars--;
                render();
            }
        };

        window.selectClass = async (className) => {
            initAudio();
            state.selectedClass = className;
            state.view = 'loading';
            render();
            await loadData(className);
        };

        window.goBack = () => { state.view = 'menu'; state.answeredStudents = []; render(); };

        async function loadData(className) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(className)}`;
                const response = await fetch(url);
                const text = await response.text();
                const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w\W]*)\);/)[1];
                const data = JSON.parse(jsonStr);
                const names = data.table.rows.map(row => (row.c[0] ? String(row.c[0].v).trim() : null)).filter(n => n && n.length > 1 && !n.toLowerCase().includes("ім'я"));
                state.allStudents = names;
                state.pendingStudents = [...names];
                state.view = 'wheel';
                render();
            } catch (e) {
                alert("Помилка даних. Спробуйте ще раз.");
                window.goBack();
            }
        }

        window.spin = () => {
            if (state.isSpinning || state.pendingStudents.length === 0) return;
            initAudio(); 
            
            state.isSpinning = true;
            const duration = 5000;
            const extra = 3600 + Math.floor(Math.random() * 360); 
            state.currentRotation += extra;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${state.currentRotation}deg)`;
            
            let lastTickAngle = 0;
            const sliceAngle = 360 / state.pendingStudents.length;
            const start = performance.now();
            
            function track(now) {
                if (!state.isSpinning) return;
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4); 
                const currentAngle = state.currentRotation * easeOut;
                
                if (Math.abs(currentAngle - lastTickAngle) >= sliceAngle) {
                    playTick();
                    lastTickAngle = currentAngle;
                }
                if (progress < 1) requestAnimationFrame(track);
            }
            requestAnimationFrame(track);
            
            setTimeout(() => {
                const normalized = (360 - (state.currentRotation % 360)) % 360;
                const winnerIndex = Math.floor(normalized / sliceAngle);
                const winner = state.pendingStudents[winnerIndex];
                
                state.lastWinner = winner;
                playWinSound();
                
                const overlay = document.getElementById('global-overlay');
                const nameDisplay = document.getElementById('winner-display-name');
                nameDisplay.innerText = winner;
                overlay.style.display = 'flex';
                
                state.isSpinning = false;
            }, duration);
        };

        window.resetProgress = () => {
            if (confirm("Почати урок з початку?")) {
                state.pendingStudents = [...state.allStudents];
                state.answeredStudents = [];
                render();
            }
        };

        function drawWheel() {
            const wheel = document.getElementById('wheel');
            if (!wheel || state.pendingStudents.length === 0) return;
            const total = state.pendingStudents.length;
            const slice = 360 / total;
            
            let bg = "conic-gradient(";
            state.pendingStudents.forEach((_, i) => {
                bg += `${COLORS[i % COLORS.length]} ${i * slice}deg ${(i + 1) * slice}deg${i === total-1 ? '' : ','}`;
            });
            wheel.style.background = bg + ")";
            
            wheel.innerHTML = '';
            state.pendingStudents.forEach((name, i) => {
                const el = document.createElement('div');
                el.className = 'slice-label';
                el.style.transform = `rotate(${i * slice + (slice / 2)}deg) translateY(-50%)`;
                el.innerText = name.length > 12 ? name.substring(0, 10) + '..' : name;
                wheel.appendChild(el);
            });
        }

        render();
    </script>
</body>
</html>

    <div id="global-overlay" onclick="window.closeOverlay()">
        <div class="invite-card" onclick="event.stopPropagation()">
            <p class="text-indigo-500 font-black uppercase tracking-[0.3em] mb-4 text-sm">До дошки запрошується</p>
            <h2 id="winner-display-name" class="text-5xl md:text-7xl font-black text-slate-800 mb-12 break-words leading-tight px-4">---</h2>
            <button onclick="window.closeOverlay()" class="w-full bg-indigo-600 text-white py-6 rounded-[2.5rem] font-black text-3xl hover:bg-indigo-700 transition-all shadow-xl active:scale-95 border-b-8 border-indigo-900">
                Я ЙДУ! 🎓
            </button>
        </div>
    </div>

    <script type="module">
        const SPREADSHEET_ID = '1_pq4ymribVOGorbZTH6D9vBt1CZwtdtLLIR6dpmgync'; 
        const CLASSES = ["7-А", "7-Б", "7-В", "7-Г", "7-Ж", "8-А", "8-Д", "10-А"];
        const COLORS = ['#4f46e5', '#ef4444', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4'];

        let state = {
            view: 'menu',
            selectedClass: null,
            allStudents: [],
            pendingStudents: [],
            answeredStudents: [], 
            isSpinning: false,
            currentRotation: 0,
            audioReady: false
        };

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => { state.audioReady = true; render(); });
            } else {
                state.audioReady = true;
            }
        }
        
        function playTick() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playWinSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.4);
            });
        }

        function render() {
            const root = document.getElementById('app-root');
            if (state.view === 'menu') {
                root.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
                        <h1 class="text-4xl md:text-6xl font-black text-slate-800 mb-2">Колесо <span class="text-indigo-600">фортуни</span></h1>
                        <p class="text-slate-400 mb-12 text-xl font-medium">Оберіть клас</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-5xl px-4">
                            ${CLASSES.map(c => `
                                <button onclick="window.selectClass('${c}')" class="bg-white p-8 rounded-[2.5rem] shadow-xl hover:shadow-indigo-200 hover:scale-105 active:scale-95 group transition-all border-b-8 border-slate-200">
                                    <div class="text-4xl mb-3">🏫</div>
                                    <div class="text-2xl font-black text-slate-700 group-hover:text-indigo-600">${c}</div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.view === 'loading') {
                root.innerHTML = `<div class="flex-1 flex items-center justify-center font-black text-2xl text-indigo-600 animate-pulse">ЗАВАНТАЖЕННЯ...</div>`;
            } else {
                root.innerHTML = `
                    <div class="flex justify-between items-center px-8 py-4 bg-white/80 border-b border-slate-200">
                        <button onclick="window.goBack()" class="bg-slate-100 px-6 py-2 rounded-xl font-black text-slate-600 hover:bg-slate-200 transition-all">← КЛАСИ</button>
                        <div class="text-center">
                            <h2 class="text-2xl font-black text-slate-800">${state.selectedClass}</h2>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${state.audioReady ? 'Звук увімкнено' : 'Натисніть будь-де для звуку'}</p>
                        </div>
                        <button onclick="window.resetProgress()" class="text-xs font-bold text-red-400 hover:text-red-600">Скинути все</button>
                    </div>

                    <div class="flex-1 flex flex-row overflow-hidden p-6 gap-6">
                        <div class="hidden xl:flex w-64 bg-white/50 rounded-[3rem] p-6 flex-col border border-white">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">У черзі: ${state.pendingStudents.length}</h3>
                            <div class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-1">
                                ${state.pendingStudents.map(n => `<div class="bg-white/80 p-3 rounded-xl text-xs font-bold text-slate-600 border border-slate-100">${n}</div>`).join('')}
                            </div>
                        </div>

                        <div class="flex-1 flex flex-col items-center justify-center">
                            <div class="wheel-outer-box">
                                <div class="wheel-container">
                                    <div class="marker"></div>
                                    <div class="center-dot">😎</div>
                                    <div id="wheel"></div>
                                </div>
                            </div>
                            <button onclick="window.spin()" id="spin-btn" ${state.pendingStudents.length === 0 ? 'disabled' : ''} 
                                class="bg-indigo-600 text-white text-4xl font-black py-6 px-24 rounded-[3rem] shadow-2xl hover:bg-indigo-700 active:scale-95 transition-all border-b-[8px] border-indigo-900 disabled:opacity-20">
                                КРУТИТИ
                            </button>
                        </div>

                        <div class="flex w-80 bg-white/50 rounded-[3rem] p-6 flex-col border border-white">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest text-right">Успіхи: ${state.answeredStudents.length}</h3>
                            <div class="flex-1 overflow-y-auto space-y-4 custom-scrollbar pr-1">
                                ${state.answeredStudents.slice().reverse().map((student) => `
                                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-indigo-50">
                                        <div class="flex justify-between items-center mb-3">
                                            <div class="text-sm font-black text-slate-700 truncate mr-2">${student.name}</div>
                                            <div class="flex gap-1.5 shrink-0">
                                                <button onclick="window.removeStar('${student.name}')" class="bg-red-500 p-1.5 rounded-lg text-white active:scale-90 transition-all">
                                                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
                                                </button>
                                                <button onclick="window.addStar('${student.name}')" class="bg-indigo-600 p-1.5 rounded-lg text-white active:scale-90 transition-all">
                                                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M5 12h14m-7-7v14"/></svg>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="star-grid">
                                            ${Array.from({length: 12}).map((_, i) => `
                                                <span class="text-lg ${student.stars > i ? 'star-active' : 'star-inactive'}">★</span>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
                drawWheel();
            }
        }

        window.addStar = (name) => {
            const student = state.answeredStudents.find(s => s.name === name);
            if (student && student.stars < 12) {
                student.stars++;
                playTick(); 
                render();
            }
        };

        window.removeStar = (name) => {
            const student = state.answeredStudents.find(s => s.name === name);
            if (student && student.stars > 0) {
                student.stars--;
                render();
            }
        };

        window.selectClass = async (className) => {
            initAudio();
            state.selectedClass = className;
            state.view = 'loading';
            render();
            await loadData(className);
        };

        window.goBack = () => { state.view = 'menu'; state.answeredStudents = []; render(); };
        
        window.closeOverlay = () => {
            document.getElementById('global-overlay').style.display = 'none';
        }

        async function loadData(className) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(className)}`;
                const response = await fetch(url);
                const text = await response.text();
                const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w\W]*)\);/)[1];
                const data = JSON.parse(jsonStr);
                const names = data.table.rows.map(row => (row.c[0] ? String(row.c[0].v).trim() : null)).filter(n => n && n.length > 1 && !n.toLowerCase().includes("ім'я"));
                state.allStudents = names;
                state.pendingStudents = [...names];
                state.view = 'wheel';
                render();
            } catch (e) {
                alert("Помилка даних. Спробуйте ще раз.");
                window.goBack();
            }
        }

        window.spin = () => {
            if (state.isSpinning || state.pendingStudents.length === 0) return;
            initAudio(); 
            
            state.isSpinning = true;
            const duration = 5000;
            const extra = 3600 + Math.floor(Math.random() * 360); 
            state.currentRotation += extra;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${state.currentRotation}deg)`;
            
            let lastTickAngle = 0;
            const sliceAngle = 360 / state.pendingStudents.length;
            const start = performance.now();
            
            function track(now) {
                if (!state.isSpinning) return;
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4); 
                const currentAngle = state.currentRotation * easeOut;
                
                if (Math.abs(currentAngle - lastTickAngle) >= sliceAngle) {
                    playTick();
                    lastTickAngle = currentAngle;
                }
                if (progress < 1) requestAnimationFrame(track);
            }
            requestAnimationFrame(track);
            
            setTimeout(() => {
                const normalized = (360 - (state.currentRotation % 360)) % 360;
                const winnerIndex = Math.floor(normalized / sliceAngle);
                const winner = state.pendingStudents[winnerIndex];
                
                playWinSound();
                
                const overlay = document.getElementById('global-overlay');
                const nameDisplay = document.getElementById('winner-display-name');
                nameDisplay.innerText = winner;
                overlay.style.display = 'flex';
                
                state.answeredStudents.push({ name: winner, stars: 0 });
                state.pendingStudents = state.pendingStudents.filter(n => n !== winner);
                state.isSpinning = false;
                render();
            }, duration);
        };

        window.resetProgress = () => {
            if (confirm("Почати урок з початку?")) {
                state.pendingStudents = [...state.allStudents];
                state.answeredStudents = [];
                render();
            }
        };

        function drawWheel() {
            const wheel = document.getElementById('wheel');
            if (!wheel || state.pendingStudents.length === 0) return;
            const total = state.pendingStudents.length;
            const slice = 360 / total;
            
            let bg = "conic-gradient(";
            state.pendingStudents.forEach((_, i) => {
                bg += `${COLORS[i % COLORS.length]} ${i * slice}deg ${(i + 1) * slice}deg${i === total-1 ? '' : ','}`;
            });
            wheel.style.background = bg + ")";
            
            wheel.innerHTML = '';
            state.pendingStudents.forEach((name, i) => {
                const el = document.createElement('div');
                el.className = 'slice-label';
                el.style.transform = `rotate(${i * slice + (slice / 2)}deg) translateY(-50%)`;
                el.innerText = name.length > 12 ? name.substring(0, 10) + '..' : name;
                wheel.appendChild(el);
            });
        }

        render();
    </script>
</body>
</html>
