<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо фортуни - Super Colorful</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-gradient: linear-gradient(135deg, #f43f5e 0%, #fb923c 100%);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a; /* Темний глибокий фон */
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.15) 0px, transparent 50%);
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        h1, h2, .font-brand { font-family: 'Montserrat', sans-serif; }

        /* Анімоване сяйво навколо колеса */
        .game-wheel-area {
            position: relative;
            width: min(82vw, 82vh);
            height: min(82vw, 82vh);
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            padding: 20px;
            box-shadow: 0 0 80px rgba(99, 102, 241, 0.3);
        }

        .wheel-container { 
            position: relative; 
            width: 100%;
            height: 100%;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            z-index: 10;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #ffffff;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* Стилізований маркер */
        .wheel-marker {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 90px;
            background: #ffffff;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 50;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
        .wheel-marker::after {
            content: '';
            position: absolute;
            top: 5px; left: 10px; right: 10px; bottom: 30px;
            background: #ef4444;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
        }

        /* Картки учнів зі скляним ефектом */
        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
        }

        .star-on { color: #fbbf24; filter: drop-shadow(0 0 5px #fbbf24); }
        .star-off { color: rgba(255,255,255,0.1); }

        /* Модальне вікно */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .winner-card {
            background: white;
            border-radius: 5rem;
            padding: 5rem;
            width: 100%;
            max-width: 900px;
            text-align: center;
            color: #1e293b;
            box-shadow: 0 0 100px rgba(99, 102, 241, 0.6);
            border: 15px solid #6366f1;
        }

        .btn-gradient {
            background: var(--primary-gradient);
            box-shadow: 0 10px 0 #4338ca;
            transition: all 0.2s;
        }
        .btn-gradient:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #4338ca;
        }
        .btn-gradient:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <div id="modal-overlay">
        <div class="winner-card">
            <p class="text-indigo-600 font-black uppercase tracking-widest text-2xl mb-6">Зірка уроку:</p>
            <h2 id="winner-name" class="text-8xl font-black mb-16 leading-tight break-words">Ім'я</h2>
            
            <div class="flex flex-col gap-8">
                <button onclick="handleAction('go')" class="btn-gradient w-full text-white py-10 rounded-[3.5rem] font-black text-5xl hover:brightness-110 active:scale-95">
                    ВІДПОВІДАЄ! 🎓
                </button>
                <div class="grid grid-cols-2 gap-8">
                    <button onclick="handleAction('reject')" class="bg-slate-200 text-slate-700 py-8 rounded-3xl font-black text-3xl hover:bg-slate-300 border-b-8 border-slate-400">
                        Спробувати ще 🔄
                    </button>
                    <button onclick="handleAction('absent')" class="bg-red-50 text-red-400 py-8 rounded-3xl font-black text-3xl hover:bg-red-100 border-b-8 border-red-200">
                        Відсутній 👤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="flex-1 flex flex-col h-full">
        <!-- Шапка -->
        <div id="header" class="hidden flex justify-between items-center px-12 py-8 bg-white/5 border-b border-white/10">
            <button onclick="location.reload()" class="font-black text-2xl text-white/40 hover:text-indigo-400 transition-colors">← КЛАСИ</button>
            <h1 id="class-title" class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">7-А</h1>
            <div class="w-40"></div>
        </div>

        <!-- Головне меню -->
        <div id="menu-view" class="flex-1 flex flex-col items-center justify-center p-10 text-center">
            <h1 class="text-9xl font-black mb-6 tracking-tighter">
                <span class="text-white">WHEEL</span><br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">FORTUNE</span>
            </h1>
            <p class="text-3xl text-slate-400 mb-20 font-medium">Оберіть ваш клас для яскравої гри</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-10 w-full max-w-7xl" id="class-grid"></div>
        </div>

        <!-- Ігрове поле -->
        <div id="game-view" class="hidden flex-1 flex flex-row overflow-hidden p-10 gap-10">
            
            <!-- Очікування -->
            <div class="w-80 glass-panel p-8 flex flex-col">
                <h3 class="text-lg font-black text-indigo-400 uppercase mb-8 tracking-widest text-center">Черга: <span id="count-pending" class="text-white">0</span></h3>
                <div id="list-pending" class="flex-1 overflow-y-auto space-y-4 custom-scroll pr-3"></div>
            </div>

            <!-- Колесо -->
            <div class="flex-1 flex flex-col items-center justify-center">
                <div class="game-wheel-area mb-12">
                    <div class="wheel-marker"></div>
                    <div class="wheel-container" id="wheel-wrapper">
                        <canvas id="wheel-canvas"></canvas>
                    </div>
                </div>
                
                <button id="spin-btn" onclick="spinWheel()" class="btn-gradient text-white px-32 py-10 rounded-full font-black text-6xl transform -translate-y-6">
                    КРУТИТИ
                </button>
            </div>

            <!-- Успіхи -->
            <div class="w-[450px] glass-panel p-8 flex flex-col">
                <h3 class="text-lg font-black text-emerald-400 uppercase mb-8 tracking-widest text-center">Відповіли: <span id="count-done" class="text-white">0</span></h3>
                <div id="list-done" class="flex-1 overflow-y-auto space-y-6 custom-scroll pr-3"></div>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1_pq4ymribVOGorbZTH6D9vBt1CZwtdtLLIR6dpmgync';
        const CLASSES = ["7-А", "7-Б", "7-В", "7-Г", "7-Ж", "8-А", "8-Д", "10-А"];
        const COLORS = ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#a855f7'];

        let state = {
            currentClass: '',
            pending: [],
            done: [],
            isSpinning: false,
            rotation: 0,
            currentWinner: null
        };

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTickSound() {
            if (!audioCtx || audioCtx.state !== 'running') return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch(e) { console.error("Audio error", e); }
        }

        const grid = document.getElementById('class-grid');
        CLASSES.forEach(c => {
            const btn = document.createElement('button');
            btn.className = "bg-white/10 border border-white/20 p-12 rounded-[3.5rem] shadow-2xl hover:bg-white/20 hover:scale-105 transition-all font-black text-5xl text-white";
            btn.innerText = c;
            btn.onclick = () => {
                initAudio();
                loadClass(c);
            };
            grid.appendChild(btn);
        });

        async function loadClass(className) {
            state.currentClass = className;
            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('header').classList.remove('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('class-title').innerText = className;

            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(className)}`;
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w\W]*)\);/)[1]);
                state.pending = json.table.rows
                    .map(r => r.c[0]?.v)
                    .filter(v => v && !["Ім'я", "ПІБ", "Учень"].includes(v));
                updateUI();
            } catch (e) {
                state.pending = ["Помилка завантаження"];
                updateUI();
            }
        }

        function updateUI() {
            const pList = document.getElementById('list-pending');
            pList.innerHTML = state.pending.map(name => `
                <div class="bg-white/5 p-5 rounded-3xl text-xl font-bold text-white/80 border border-white/10">${name}</div>
            `).join('');
            document.getElementById('count-pending').innerText = state.pending.length;

            const dList = document.getElementById('list-done');
            dList.innerHTML = state.done.slice().reverse().map(s => `
                <div class="bg-white/10 p-6 rounded-[2.5rem] border border-white/10 shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-black text-white text-2xl truncate w-56">${s.name}</span>
                        <div class="flex gap-3">
                            <button onclick="changeStar('${s.name}', -1)" class="bg-white/10 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-3xl text-white/50">-</button>
                            <button onclick="changeStar('${s.name}', 1)" class="bg-indigo-500 w-12 h-12 rounded-2xl flex items-center justify-center font-black text-3xl text-white shadow-lg">+</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-6 gap-2">
                        ${Array.from({length: 12}).map((_, i) => `
                            <span class="text-3xl ${s.stars > i ? 'star-on' : 'star-off'}">★</span>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('count-done').innerText = state.done.length;

            drawWheel();
        }

        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const size = 1200;
            canvas.width = size;
            canvas.height = size;

            if (state.pending.length === 0) return;

            const slice = (Math.PI * 2) / state.pending.length;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 30;

            state.pending.forEach((name, i) => {
                const angle = i * slice;
                ctx.beginPath();
                ctx.fillStyle = COLORS[i % COLORS.length];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + slice);
                ctx.fill();

                ctx.strokeStyle = "rgba(255,255,255,0.15)";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + slice / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Inter";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                const displayName = name.length > 18 ? name.substring(0, 16) + '..' : name;
                ctx.fillText(displayName, radius - 80, 15);
                ctx.restore();
            });
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.lineWidth = 15;
            ctx.strokeStyle = "#1e293b";
            ctx.stroke();
        }

        function spinWheel() {
            initAudio(); // Пробуджуємо звук
            if (state.isSpinning || state.pending.length === 0) {
                // Якщо раптом кнопка неактивна але ми сюди потрапили - примусово відновлюємо її
                document.getElementById('spin-btn').disabled = false;
                document.getElementById('spin-btn').innerText = "КРУТИТИ";
                return;
            }
            
            state.isSpinning = true;
            const spinBtn = document.getElementById('spin-btn');
            spinBtn.disabled = true;
            spinBtn.innerText = "КРУТИМО...";

            const extraDegrees = 3600 + Math.random() * 3600;
            state.rotation += extraDegrees;
            
            const wrapper = document.getElementById('wheel-wrapper');
            wrapper.style.transform = `rotate(${state.rotation}deg)`;

            let lastTickSlice = -1;
            const sliceDeg = 360 / state.pending.length;

            const tickInterval = setInterval(() => {
                if (!state.isSpinning) { clearInterval(tickInterval); return; }
                const style = window.getComputedStyle(wrapper);
                const matrix = new DOMMatrixReadOnly(style.transform);
                const currentAngle = Math.atan2(matrix.m12, matrix.m11) * (180 / Math.PI);
                const normalizedAngle = (360 - (currentAngle % 360) + 270) % 360;
                const currentSlice = Math.floor(normalizedAngle / sliceDeg);
                if (currentSlice !== lastTickSlice) {
                    playTickSound();
                    lastTickSlice = currentSlice;
                }
            }, 40);

            setTimeout(() => {
                clearInterval(tickInterval);
                const sectorIndex = Math.floor(((360 - (state.rotation % 360)) + 270) % 360 / sliceDeg) % state.pending.length;
                state.currentWinner = state.pending[sectorIndex];
                document.getElementById('winner-name').innerText = state.currentWinner;
                document.getElementById('modal-overlay').style.display = 'flex';
            }, 5100);
        }

        window.handleAction = (type) => {
            const overlay = document.getElementById('modal-overlay');
            const spinBtn = document.getElementById('spin-btn');
            
            if (type === 'go') {
                state.done.push({ name: state.currentWinner, stars: 0 });
                state.pending = state.pending.filter(n => n !== state.currentWinner);
            } else if (type === 'absent') {
                state.pending = state.pending.filter(n => n !== state.currentWinner);
            }

            // ПРИМУСОВЕ СКИНАННЯ СТАНУ
            state.isSpinning = false;
            spinBtn.disabled = false;
            spinBtn.innerText = "КРУТИТИ";
            
            overlay.style.display = 'none';
            updateUI();
        }

        window.changeStar = (name, delta) => {
            const student = state.done.find(s => s.name === name);
            if (student) {
                student.stars = Math.min(12, Math.max(0, student.stars + delta));
                updateUI();
            }
        }
        
        // Додатковий запобіжник: перевірка кожні 10 секунд, чи не "зависла" кнопка
        setInterval(() => {
            if (!state.isSpinning && document.getElementById('modal-overlay').style.display !== 'flex') {
                const spinBtn = document.getElementById('spin-btn');
                if (spinBtn.disabled) {
                    spinBtn.disabled = false;
                    spinBtn.innerText = "КРУТИТИ";
                }
            }
        }, 10000);
    </script>
</body>
</html>
