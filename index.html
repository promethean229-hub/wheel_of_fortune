<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо фортуни - Смарт-дошка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            background: #f1f5f9; 
            background-image: 
                radial-gradient(at 0% 0%, hsla(223,100%,93%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(210,100%,92%,1) 0, transparent 50%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .wheel-container { 
            position: relative; 
            width: 480px; 
            height: 480px; 
            filter: drop-shadow(0 30px 50px rgba(79, 70, 229, 0.2)); 
        }

        #wheel { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 12px solid #fff; 
            position: relative; 
            overflow: hidden; 
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); 
            background: #e2e8f0;
        }

        .marker { 
            position: absolute; 
            top: -10px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 40px; 
            height: 50px; 
            background: #ef4444; 
            clip-path: polygon(50% 100%, 0 0, 100% 0); 
            z-index: 30; 
        }

        .center-dot { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 70px; 
            height: 70px; 
            background: white; 
            border: 6px solid #f8fafc; 
            border-radius: 50%; 
            z-index: 40; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2rem; 
        }

        .slice-label { 
            color: white; 
            font-weight: 900; 
            font-size: 1rem; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform-origin: 0% 50%; 
            width: 210px; 
            text-align: right; 
            pointer-events: none; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
            padding-right: 15px;
            white-space: nowrap;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app-root" class="h-full w-full"></div>

    <script type="module">
        const SPREADSHEET_ID = '1_pq4ymribVOGorbZTH6D9vBt1CZwtdtLLIR6dpmgync'; 
        const CLASSES = ["7-А", "7-Б", "7-В", "7-Г", "7-Ж", "8-А", "8-Д", "10-А"];
        const COLORS = ['#4f46e5', '#ef4444', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4'];

        let state = {
            view: 'menu',
            selectedClass: null,
            allStudents: [],
            pendingStudents: [],
            answeredStudents: [],
            isSpinning: false,
            currentRotation: 0,
            errorMessage: null
        };

        function render() {
            const root = document.getElementById('app-root');
            if (state.view === 'menu') {
                root.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center p-4 text-center">
                        <h1 class="text-5xl font-black text-slate-800 mb-2">Колесо <span class="text-indigo-600">фортуни</span></h1>
                        <p class="text-slate-500 mb-10 text-lg">Виберіть клас для завантаження списку</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl">
                            ${CLASSES.map(c => `
                                <button onclick="window.selectClass('${c}')" class="bg-white p-6 rounded-3xl shadow-lg hover:bg-indigo-600 group transition-all transform hover:-translate-y-1 border-b-4 border-slate-200">
                                    <div class="text-3xl mb-2">🏫</div>
                                    <div class="text-2xl font-black text-slate-700 group-hover:text-white">${c}</div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.view === 'loading') {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full">
                        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4"></div>
                        <div class="text-lg font-bold text-slate-600">З'єднання з Google Таблицею...</div>
                        ${state.errorMessage ? `<div class="mt-4 p-4 bg-red-100 text-red-600 rounded-xl max-w-md text-sm">${state.errorMessage}</div>` : ''}
                        ${state.errorMessage ? `<button onclick="window.goBack()" class="mt-4 text-indigo-600 underline">Спробувати ще раз</button>` : ''}
                    </div>
                `;
            } else {
                root.innerHTML = `
                    <div class="h-full flex flex-col p-6 overflow-hidden">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="window.goBack()" class="bg-white px-5 py-2 rounded-xl font-bold shadow hover:bg-slate-50">← КЛАСИ</button>
                            <h2 class="text-3xl font-black text-slate-800">${state.selectedClass}</h2>
                            <button onclick="window.resetProgress()" class="text-red-500 text-sm font-bold uppercase tracking-tighter">Скинути</button>
                        </div>
                        <div class="flex-1 grid grid-cols-1 md:grid-cols-4 gap-6 min-h-0">
                            <div class="hidden md:flex bg-white/50 backdrop-blur rounded-3xl p-4 flex-col min-h-0 border border-white">
                                <h3 class="text-xs font-black text-slate-400 uppercase mb-3">Очікують (${state.pendingStudents.length})</h3>
                                <div class="overflow-y-auto space-y-2 custom-scrollbar">
                                    ${state.pendingStudents.map(n => `<div class="bg-white p-2 rounded-lg shadow-sm text-sm font-bold">${n}</div>`).join('')}
                                </div>
                            </div>
                            <div class="md:col-span-2 flex flex-col items-center justify-center">
                                <div class="wheel-container scale-75 md:scale-100">
                                    <div class="marker"></div>
                                    <div class="center-dot">🎯</div>
                                    <div id="wheel"></div>
                                </div>
                                <button onclick="window.spin()" id="spin-btn" ${state.pendingStudents.length === 0 ? 'disabled' : ''} 
                                    class="mt-8 bg-indigo-600 text-white text-3xl font-black py-4 px-16 rounded-full shadow-xl hover:bg-indigo-700 active:scale-95 disabled:opacity-10 transition-all">
                                    КРУТИТИ!
                                </button>
                            </div>
                            <div class="hidden md:flex bg-white/50 backdrop-blur rounded-3xl p-4 flex-col min-h-0 border border-white">
                                <h3 class="text-xs font-black text-slate-400 uppercase mb-3">Відповіли (${state.answeredStudents.length})</h3>
                                <div class="overflow-y-auto space-y-2 custom-scrollbar">
                                    ${state.answeredStudents.slice().reverse().map(n => `<div class="bg-green-50 p-2 rounded-lg text-sm font-bold text-green-700 opacity-60">✓ ${n}</div>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="winner-modal" class="fixed inset-0 bg-slate-900/90 hidden items-center justify-center z-50 p-4" onclick="window.closeModal()">
                        <div class="bg-white rounded-[3rem] p-10 max-w-lg w-full text-center shadow-2xl" onclick="event.stopPropagation()">
                            <div class="text-6xl mb-4">🎓</div>
                            <div id="winner-name" class="text-4xl font-black text-indigo-600 mb-8"></div>
                            <button onclick="window.closeModal()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl hover:bg-indigo-700">ГОТОВО</button>
                        </div>
                    </div>
                `;
                drawWheel();
            }
        }

        window.selectClass = async (className) => {
            state.selectedClass = className;
            state.view = 'loading';
            state.errorMessage = null;
            render();
            await loadData(className);
        };

        window.goBack = () => { 
            state.view = 'menu'; 
            state.answeredStudents = [];
            state.errorMessage = null;
            render(); 
        };
        
        window.closeModal = () => document.getElementById('winner-modal').classList.add('hidden');

        async function loadData(className) {
            // МЕТОД 1: Google Visualization API (Найшвидший)
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(className)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Network response was not ok");
                const text = await response.text();
                const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w\W]*)\);/)[1];
                const data = JSON.parse(jsonStr);
                
                const names = data.table.rows
                    .map(row => (row.c[0] ? String(row.c[0].v).trim() : null))
                    .filter(n => n && n.length > 1 && !n.toLowerCase().includes("ім'я"));

                if (names.length > 0) return success(names);
            } catch (e) {
                console.warn("Method 1 failed, trying Method 2...");
            }

            // МЕТОД 2: Прямий CSV експорт (Найбільш сумісний з старими дошками)
            try {
                const csvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&sheet=${encodeURIComponent(className)}`;
                const response = await fetch(csvUrl);
                const text = await response.text();
                const names = text.split(/\r?\n/)
                    .map(line => line.replace(/^"|"$/g, '').replace(/""/g, '"').trim())
                    .filter(n => n.length > 1 && !n.toLowerCase().includes("ім'я"));

                if (names.length > 0) return success(names);
            } catch (e) {
                console.warn("Method 2 failed, trying Method 3...");
            }

            // МЕТОД 3: AllOrigins Proxy (Якщо браузер дошки блокує CORS)
            try {
                const target = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(className)}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const names = data.contents.split(/\r?\n/)
                    .map(line => line.replace(/^"|"$/g, '').trim())
                    .filter(n => n.length > 1 && !n.toLowerCase().includes("ім'я"));

                if (names.length > 0) return success(names);
            } catch (e) {
                state.errorMessage = "Не вдалося отримати дані. Перевірте: 1. Чи підключена дошка до інтернету? 2. Чи відкрита таблиця для всіх?";
                render();
            }
        }

        function success(names) {
            state.allStudents = names;
            state.pendingStudents = [...names];
            state.answeredStudents = [];
            state.view = 'wheel';
            render();
        }

        window.spin = () => {
            if (state.isSpinning || state.pendingStudents.length === 0) return;
            state.isSpinning = true;
            const extra = Math.floor(Math.random() * 360) + 1440;
            state.currentRotation += extra;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${state.currentRotation}deg)`;
            
            setTimeout(() => {
                const sliceAngle = 360 / state.pendingStudents.length;
                const normalized = (360 - (state.currentRotation % 360)) % 360;
                const winnerIndex = Math.floor(normalized / sliceAngle);
                const winner = state.pendingStudents[winnerIndex];
                
                document.getElementById('winner-name').innerText = winner;
                document.getElementById('winner-modal').classList.remove('hidden');
                document.getElementById('winner-modal').classList.add('flex');
                
                state.answeredStudents.push(winner);
                state.pendingStudents = state.pendingStudents.filter(n => n !== winner);
                
                state.isSpinning = false;
                render();
            }, 5000);
        };

        window.resetProgress = () => {
            if (confirm("Скинути список?")) {
                state.pendingStudents = [...state.allStudents];
                state.answeredStudents = [];
                render();
            }
        };

        function drawWheel() {
            const wheel = document.getElementById('wheel');
            if (!wheel || state.pendingStudents.length === 0) return;
            const total = state.pendingStudents.length;
            const slice = 360 / total;
            
            let bg = "conic-gradient(";
            state.pendingStudents.forEach((_, i) => {
                bg += `${COLORS[i % COLORS.length]} ${i * slice}deg ${(i + 1) * slice}deg${i === total-1 ? '' : ','}`;
            });
            wheel.style.background = bg + ")";
            
            wheel.innerHTML = '';
            state.pendingStudents.forEach((name, i) => {
                const el = document.createElement('div');
                el.className = 'slice-label';
                el.style.transform = `rotate(${i * slice + (slice / 2)}deg) translateY(-50%)`;
                el.innerText = name;
                wheel.appendChild(el);
            });
        }

        render();
    </script>
</body>
</html>
