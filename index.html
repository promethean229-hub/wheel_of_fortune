<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо Фортуни - Повна Версія</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc;
            overflow: hidden;
            height: 100vh;
        }

        /* Колесо */
        .wheel-container { 
            position: relative; 
            width: min(70vw, 55vh); 
            height: min(70vw, 55vh);
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .wheel-marker {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: #ef4444;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 20;
        }

        /* Зірки */
        .star-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 2px;
        }
        .star { font-size: 1.2rem; line-height: 1; }
        .star-on { color: #f59e0b; }
        .star-off { color: #e2e8f0; }

        /* Картка запрошення */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .invite-card {
            background: white;
            border-radius: 3rem;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 8px solid #4f46e5;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Модалка (Карточка) -->
    <div id="modal-overlay">
        <div class="invite-card">
            <p class="text-indigo-500 font-black uppercase tracking-widest mb-2">Запрошуємо до відповіді</p>
            <h2 id="winner-name" class="text-5xl font-black text-slate-800 mb-8 leading-tight">---</h2>
            
            <div class="flex flex-col gap-4">
                <button onclick="handleAction('go')" class="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-3xl hover:bg-indigo-700 active:scale-95 transition-all shadow-xl border-b-8 border-indigo-900">
                    Я ЙДУ! 🎓
                </button>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleAction('reject')" class="bg-slate-200 text-slate-700 py-4 rounded-2xl font-black text-lg hover:bg-slate-300 active:scale-95 border-b-4 border-slate-400">
                        ВІДМОВЛЯЮСЯ ❌
                    </button>
                    <button onclick="handleAction('absent')" class="bg-slate-100 text-slate-400 py-4 rounded-2xl font-black text-lg hover:bg-slate-200 active:scale-95 border-b-4 border-slate-300">
                        ВІДСУТНІЙ 👤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Основний інтерфейс -->
    <div id="app" class="flex-1 flex flex-col h-full">
        <!-- Шапка -->
        <div id="header" class="hidden flex justify-between items-center px-8 py-4 bg-white border-b border-slate-200">
            <button onclick="location.reload()" class="font-bold text-slate-500 hover:text-indigo-600">← НАЗАД</button>
            <h1 id="class-title" class="text-2xl font-black text-slate-800">Клас</h1>
            <div class="w-20"></div>
        </div>

        <!-- Вибір класу (Головна) -->
        <div id="menu-view" class="flex-1 flex flex-col items-center justify-center p-6">
            <h1 class="text-5xl font-black text-slate-800 mb-2">Колесо <span class="text-indigo-600">Фортуни</span></h1>
            <p class="text-slate-400 mb-10">Оберіть клас для початку уроку</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-4xl" id="class-grid"></div>
        </div>

        <!-- Робоча зона -->
        <div id="game-view" class="hidden flex-1 flex flex-row overflow-hidden p-6 gap-6">
            <!-- Список Черги -->
            <div class="w-64 bg-white/50 rounded-[2rem] p-5 flex flex-col border border-white">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">У черзі: <span id="count-pending">0</span></h3>
                <div id="list-pending" class="flex-1 overflow-y-auto space-y-2 custom-scroll"></div>
            </div>

            <!-- Колесо -->
            <div class="flex-1 flex flex-col items-center justify-center">
                <div class="wheel-container mb-8" id="wheel-wrapper">
                    <div class="wheel-marker"></div>
                    <canvas id="wheel-canvas"></canvas>
                </div>
                <button id="spin-btn" onclick="spinWheel()" class="bg-indigo-600 text-white px-16 py-6 rounded-[2.5rem] font-black text-3xl shadow-2xl hover:bg-indigo-700 active:scale-95 transition-all border-b-8 border-indigo-900">
                    КРУТИТИ
                </button>
            </div>

            <!-- Список Успіхів -->
            <div class="w-80 bg-white/50 rounded-[2rem] p-5 flex flex-col border border-white">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Успіхи: <span id="count-done">0</span></h3>
                <div id="list-done" class="flex-1 overflow-y-auto space-y-3 custom-scroll"></div>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1_pq4ymribVOGorbZTH6D9vBt1CZwtdtLLIR6dpmgync';
        const CLASSES = ["7-А", "7-Б", "7-В", "7-Г", "7-Ж", "8-А", "8-Д", "10-А"];
        const COLORS = ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6'];

        let state = {
            currentClass: '',
            pending: [],
            done: [],
            isSpinning: false,
            rotation: 0
        };

        // Ініціалізація кнопок класів
        const grid = document.getElementById('class-grid');
        CLASSES.forEach(c => {
            const btn = document.createElement('button');
            btn.className = "bg-white p-6 rounded-3xl shadow-lg hover:shadow-indigo-100 hover:scale-105 transition-all font-black text-xl text-slate-700 border-b-4 border-slate-200";
            btn.innerText = c;
            btn.onclick = () => loadClass(c);
            grid.appendChild(btn);
        });

        async function loadClass(className) {
            state.currentClass = className;
            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('header').classList.remove('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('class-title').innerText = className;

            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(className)}`;
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w\W]*)\);/)[1]);
                state.pending = json.table.rows
                    .map(r => r.c[0]?.v)
                    .filter(v => v && v !== "Ім'я" && v !== "ПІБ");
                updateUI();
            } catch (e) {
                alert("Помилка завантаження");
            }
        }

        function updateUI() {
            // Оновлення черги
            const pList = document.getElementById('list-pending');
            pList.innerHTML = state.pending.map(name => `
                <div class="bg-white/80 p-3 rounded-xl text-xs font-bold text-slate-600 border border-slate-100">${name}</div>
            `).join('');
            document.getElementById('count-pending').innerText = state.pending.length;

            // Оновлення успіхів
            const dList = document.getElementById('list-done');
            dList.innerHTML = state.done.slice().reverse().map(s => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-indigo-50">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-slate-700 text-sm truncate w-32">${s.name}</span>
                        <div class="flex gap-1">
                            <button onclick="changeStar('${s.name}', -1)" class="bg-slate-100 w-6 h-6 rounded flex items-center justify-center font-bold text-slate-500">-</button>
                            <button onclick="changeStar('${s.name}', 1)" class="bg-indigo-600 w-6 h-6 rounded flex items-center justify-center font-bold text-white">+</button>
                        </div>
                    </div>
                    <div class="star-grid">
                        ${Array.from({length: 12}).map((_, i) => `
                            <span class="star ${s.stars > i ? 'star-on' : 'star-off'}">★</span>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('count-done').innerText = state.done.length;

            drawWheel();
        }

        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const size = 500;
            canvas.width = size;
            canvas.height = size;

            if (state.pending.length === 0) return;

            const slice = (Math.PI * 2) / state.pending.length;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 10;

            state.pending.forEach((name, i) => {
                const angle = i * slice;
                ctx.beginPath();
                ctx.fillStyle = COLORS[i % COLORS.length];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + slice);
                ctx.fill();

                // Текст
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + slice / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Inter";
                ctx.fillText(name.substring(0, 15), radius - 20, 5);
                ctx.restore();
            });
        }

        let currentWinner = "";

        function spinWheel() {
            if (state.isSpinning || state.pending.length === 0) return;
            state.isSpinning = true;

            const extraDegrees = 1800 + Math.random() * 360;
            state.rotation += extraDegrees;
            
            const wrapper = document.getElementById('wheel-wrapper');
            wrapper.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.2, 1)";
            wrapper.style.transform = `rotate(${state.rotation}deg)`;

            setTimeout(() => {
                state.isSpinning = false;
                const actualDeg = (360 - (state.rotation % 360)) % 360;
                const sliceDeg = 360 / state.pending.length;
                const index = Math.floor(actualDeg / sliceDeg);
                currentWinner = state.pending[index];

                showModal(currentWinner);
            }, 5100);
        }

        function showModal(name) {
            document.getElementById('winner-name').innerText = name;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        window.handleAction = (type) => {
            const overlay = document.getElementById('modal-overlay');
            
            if (type === 'go') {
                state.done.push({ name: currentWinner, stars: 0 });
                state.pending = state.pending.filter(n => n !== currentWinner);
            } else if (type === 'absent') {
                state.pending = state.pending.filter(n => n !== currentWinner);
            } else if (type === 'reject') {
                // Нічого не робимо, учень залишається в pending
            }

            overlay.style.display = 'none';
            updateUI();
        }

        window.changeStar = (name, delta) => {
            const student = state.done.find(s => s.name === name);
            if (student) {
                student.stars = Math.min(12, Math.max(0, student.stars + delta));
                updateUI();
            }
        }
    </script>
</body>
</html>
