<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо фортуни - Смарт-дошка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            background: #f1f5f9; 
            background-image: 
                radial-gradient(at 0% 0%, hsla(223,100%,93%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(210,100%,92%,1) 0, transparent 50%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .wheel-outer-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0; 
            padding: 10px;
        }

        .wheel-container { 
            position: relative; 
            width: min(75vw, 65vh); 
            height: min(75vw, 65vh);
            max-width: 500px; 
            max-height: 500px;
            filter: drop-shadow(0 20px 40px rgba(79, 70, 229, 0.25)); 
        }

        #wheel { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 10px solid #fff; 
            position: relative; 
            overflow: hidden; 
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); 
            background: #e2e8f0;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1);
        }

        .marker { 
            position: absolute; 
            top: -10px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: min(8vw, 40px); 
            height: min(10vw, 50px); 
            background: #ef4444; 
            clip-path: polygon(50% 100%, 0 0, 100% 0); 
            z-index: 30; 
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.2));
        }

        .center-dot { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 15%; 
            height: 15%; 
            background: white; 
            border: 4px solid #f1f5f9; 
            border-radius: 50%; 
            z-index: 40; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: min(4vw, 1.5rem); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .slice-label { 
            color: white; 
            font-weight: 900; 
            font-size: clamp(0.6rem, 1.8vh, 1rem); 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform-origin: 0% 50%; 
            width: 42%; 
            text-align: right; 
            pointer-events: none; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.6); 
            padding-right: 15px;
            white-space: nowrap;
        }

        @keyframes inviteBounce {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .invite-card {
            animation: inviteBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: white;
            border-radius: 3rem;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
            border: 10px solid #4f46e5;
            position: relative;
        }

        .invite-card::before {
            content: '✨';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            background: white;
            padding: 0 15px;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .star-active { color: #f59e0b; filter: drop-shadow(0 0 3px rgba(245, 158, 11, 0.5)); }
        .star-inactive { color: #e2e8f0; }
    </style>
</head>
<body>
    <div id="app-root" class="h-full w-full flex flex-col"></div>

    <script type="module">
        const SPREADSHEET_ID = '1_pq4ymribVOGorbZTH6D9vBt1CZwtdtLLIR6dpmgync'; 
        const CLASSES = ["7-А", "7-Б", "7-В", "7-Г", "7-Ж", "8-А", "8-Д", "10-А"];
        const COLORS = ['#4f46e5', '#ef4444', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4'];

        let state = {
            view: 'menu',
            selectedClass: null,
            allStudents: [],
            pendingStudents: [],
            answeredStudents: [], // Тепер тут об'єкти { name, stars }
            isSpinning: false,
            currentRotation: 0,
            audioReady: false
        };

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => { state.audioReady = true; render(); });
            } else {
                state.audioReady = true;
            }
        }
        
        function playTick() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(160, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.06);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.06);
        }

        function playWinSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.3);
            });
        }

        function render() {
            const root = document.getElementById('app-root');
            if (state.view === 'menu') {
                root.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
                        <h1 class="text-4xl md:text-5xl font-black text-slate-800 mb-2">Колесо <span class="text-indigo-600">фортуни</span></h1>
                        <p class="text-slate-500 mb-10 text-lg">Виберіть клас</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-4xl px-4">
                            ${CLASSES.map(c => `
                                <button onclick="window.selectClass('${c}')" class="bg-white p-6 rounded-3xl shadow-lg hover:shadow-indigo-200 hover:scale-105 active:scale-95 group transition-all border-b-4 border-slate-200">
                                    <div class="text-3xl mb-2">🏫</div>
                                    <div class="text-xl font-black text-slate-700 group-hover:text-indigo-600">${c}</div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.view === 'loading') {
                root.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4"></div>
                        <div class="text-slate-600 font-bold text-lg">Синхронізація списків...</div>
                    </div>
                `;
            } else {
                root.innerHTML = `
                    <div class="flex justify-between items-center px-6 py-3 bg-white/50 backdrop-blur-md border-b border-white/50">
                        <button onclick="window.goBack()" class="bg-white px-5 py-2 rounded-xl font-bold shadow-sm text-sm hover:bg-slate-50 transition-all active:scale-95">← НАЗАД</button>
                        <div class="flex flex-col items-center">
                            <h2 class="text-xl font-black text-slate-800 leading-none">${state.selectedClass}</h2>
                            <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">${state.audioReady ? '🔊 Звук активовано' : '🔇 Натисніть для звуку'}</span>
                        </div>
                        <button onclick="window.resetProgress()" class="bg-slate-100 px-4 py-2 rounded-xl text-slate-500 text-[10px] font-bold uppercase hover:bg-red-50 hover:text-red-600 transition-all">Скинути</button>
                    </div>

                    <div class="flex-1 flex flex-row overflow-hidden p-4 gap-6">
                        <!-- Список очікування -->
                        <div class="hidden xl:flex w-72 bg-white/30 rounded-[2.5rem] p-5 flex-col border border-white/60">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Очікують (${state.pendingStudents.length})</h3>
                            <div class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-1">
                                ${state.pendingStudents.map(n => `<div class="bg-white/90 p-3 rounded-2xl shadow-sm text-xs font-bold text-slate-700">${n}</div>`).join('')}
                            </div>
                        </div>

                        <!-- Центральна частина -->
                        <div class="flex-1 flex flex-col min-w-0">
                            <div class="wheel-outer-box">
                                <div class="wheel-container">
                                    <div class="marker"></div>
                                    <div class="center-dot">🎯</div>
                                    <div id="wheel"></div>
                                </div>
                            </div>
                            
                            <div class="pb-6 flex justify-center">
                                <button onclick="window.spin()" id="spin-btn" ${state.pendingStudents.length === 0 ? 'disabled' : ''} 
                                    class="bg-indigo-600 text-white text-3xl font-black py-5 px-20 rounded-[2rem] shadow-2xl hover:bg-indigo-700 active:scale-90 active:translate-y-1 disabled:opacity-30 transition-all border-b-8 border-indigo-900">
                                    КРУТИТИ!
                                </button>
                            </div>
                        </div>

                        <!-- Список відповідей зі ЗІРОЧКАМИ -->
                        <div class="hidden xl:flex w-80 bg-white/30 rounded-[2.5rem] p-5 flex-col border border-white/60">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest text-right">Успіхи (${state.answeredStudents.length})</h3>
                            <div class="flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-1">
                                ${state.answeredStudents.slice().reverse().map((student, idx) => `
                                    <div class="bg-white/90 p-3 rounded-2xl shadow-sm border border-indigo-50 flex flex-col gap-2">
                                        <div class="text-xs font-black text-indigo-900 truncate">✓ ${student.name}</div>
                                        <div class="flex justify-between items-center">
                                            <div class="flex gap-1">
                                                ${[1, 2, 3].map(num => `
                                                    <span class="text-xl ${student.stars >= num ? 'star-active' : 'star-inactive'} transition-all">★</span>
                                                `).join('')}
                                            </div>
                                            <button onclick="window.addStar('${student.name}')" class="bg-indigo-50 hover:bg-indigo-100 p-2 rounded-lg text-indigo-600 transition-colors">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Модальне вікно -->
                    <div id="winner-modal" class="fixed inset-0 bg-indigo-900/70 hidden items-center justify-center z-50 p-6 backdrop-blur-md" onclick="window.closeModal()">
                        <div class="invite-card" onclick="event.stopPropagation()">
                            <div id="winner-name" class="text-5xl font-black text-indigo-600 mb-4 break-words leading-tight drop-shadow-sm"></div>
                            <div class="h-[2px] w-16 bg-slate-100 mx-auto mb-6"></div>
                            <h4 class="text-slate-500 font-bold uppercase text-lg tracking-wide mb-10">до відповіді запрошується...</h4>
                            <button onclick="window.closeModal()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-2xl hover:bg-indigo-700 shadow-lg active:scale-95 transition-all border-b-4 border-indigo-800">
                                ВЖЕ ЙДУ!
                            </button>
                        </div>
                    </div>
                `;
                drawWheel();
            }
        }

        // Логіка додавання зірочок
        window.addStar = (name) => {
            const student = state.answeredStudents.find(s => s.name === name);
            if (student) {
                // Циклічне додавання: 0 -> 1 -> 2 -> 3 -> 0
                student.stars = (student.stars + 1) % 4;
                if (student.stars > 0) playTick(); // Короткий звук при додаванні
                render();
            }
        };

        window.selectClass = async (className) => {
            initAudio();
            state.selectedClass = className;
            state.view = 'loading';
            render();
            await loadData(className);
        };

        window.goBack = () => { 
            state.view = 'menu'; 
            state.answeredStudents = [];
            render(); 
        };
        
        window.closeModal = () => document.getElementById('winner-modal').classList.add('hidden');

        async function loadData(className) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(className)}`;
                const response = await fetch(url);
                const text = await response.text();
                const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w\W]*)\);/)[1];
                const data = JSON.parse(jsonStr);
                const names = data.table.rows.map(row => (row.c[0] ? String(row.c[0].v).trim() : null)).filter(n => n && n.length > 1 && !n.toLowerCase().includes("ім'я"));
                success(names);
            } catch (e) {
                const csvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&sheet=${encodeURIComponent(className)}`;
                fetch(csvUrl).then(r => r.text()).then(text => {
                    const names = text.split(/\r?\n/).map(line => line.replace(/^"|"$/g, '').trim()).filter(n => n.length > 1 && !n.toLowerCase().includes("ім'я"));
                    success(names);
                }).catch(() => {
                    alert("Помилка завантаження даних.");
                    window.goBack();
                });
            }
        }

        function success(names) {
            state.allStudents = names;
            state.pendingStudents = [...names];
            state.view = 'wheel';
            render();
        }

        window.spin = () => {
            if (state.isSpinning || state.pendingStudents.length === 0) return;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            state.isSpinning = true;
            const duration = 5000;
            const extra = Math.floor(Math.random() * 360) + 2880; 
            state.currentRotation += extra;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${state.currentRotation}deg)`;
            
            let lastTickAngle = 0;
            const sliceAngle = 360 / state.pendingStudents.length;
            const start = performance.now();
            
            function trackTicks(now) {
                if (!state.isSpinning) return;
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4); 
                const currentAngle = state.currentRotation * easeOut;
                
                if (Math.abs(currentAngle - lastTickAngle) >= sliceAngle) {
                    playTick();
                    lastTickAngle = currentAngle;
                }
                if (progress < 1) requestAnimationFrame(trackTicks);
            }
            requestAnimationFrame(trackTicks);
            
            setTimeout(() => {
                const normalized = (360 - (state.currentRotation % 360)) % 360;
                const winnerIndex = Math.floor(normalized / sliceAngle);
                const winner = state.pendingStudents[winnerIndex];
                
                playWinSound();
                document.getElementById('winner-name').innerText = winner;
                document.getElementById('winner-modal').classList.remove('hidden');
                document.getElementById('winner-modal').classList.add('flex');
                
                // Додаємо об'єкт учня з нульовою кількістю зірочок за замовчуванням
                state.answeredStudents.push({ name: winner, stars: 0 });
                state.pendingStudents = state.pendingStudents.filter(n => n !== winner);
                state.isSpinning = false;
                render();
            }, duration);
        };

        window.resetProgress = () => {
            if (confirm("Скинути прогерес для цього класу?")) {
                state.pendingStudents = [...state.allStudents];
                state.answeredStudents = [];
                render();
            }
        };

        function drawWheel() {
            const wheel = document.getElementById('wheel');
            if (!wheel || state.pendingStudents.length === 0) return;
            const total = state.pendingStudents.length;
            const slice = 360 / total;
            
            let bg = "conic-gradient(";
            state.pendingStudents.forEach((_, i) => {
                bg += `${COLORS[i % COLORS.length]} ${i * slice}deg ${(i + 1) * slice}deg${i === total-1 ? '' : ','}`;
            });
            wheel.style.background = bg + ")";
            
            wheel.innerHTML = '';
            state.pendingStudents.forEach((name, i) => {
                const el = document.createElement('div');
                el.className = 'slice-label';
                el.style.transform = `rotate(${i * slice + (slice / 2)}deg) translateY(-50%)`;
                el.innerText = name;
                wheel.appendChild(el);
            });
        }

        render();
    </script>
</body>
</html>
