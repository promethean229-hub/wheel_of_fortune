<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо фортуни - Навігація</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // ПАРАМЕТРИ ТАБЛИЦІ
        const SPREADSHEET_ID = 'ВАШ_ID_З_КРОКУ_2'; 

        // СТРУКТУРА КЛАСІВ ТА ТЕМ
        const SCHOOL_STRUCTURE = {
            "7 клас": ["7-А", "7-Б", "7-В", "7-Г", "7-Ж"],
            "8 клас": ["8-А", "8-Д"],
            "10 клас": ["10-А"]
        };
        const TOTAL_THEMES = 10; // Кількість коліс (тем) для кожного класу

        // СТАН ДОДАТКУ
        let state = {
            view: 'menu', // 'menu' або 'wheel'
            selectedClass: null,
            selectedTheme: null,
            allStudents: [],
            pendingStudents: [],
            answeredStudents: [],
            isSpinning: false,
            currentRotation: 0,
            currentUser: null,
            unsubscribe: null
        };

        const colors = ['#4f46e5', '#ef4444', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4'];

        async function initAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        async function startApp() {
            await initAuth();
            onAuthStateChanged(auth, (user) => {
                state.currentUser = user;
                render();
            });
        }

        // НАВІГАЦІЯ
        window.selectWheel = (className, themeNum) => {
            state.selectedClass = className;
            state.selectedTheme = themeNum;
            state.view = 'loading';
            render();
            loadWheelData();
        };

        window.goBack = () => {
            if (state.unsubscribe) state.unsubscribe();
            state.view = 'menu';
            state.selectedClass = null;
            state.selectedTheme = null;
            render();
        };

        // ЗАВАНТАЖЕННЯ ДАНИХ КОЛЕСА
        async function loadWheelData() {
            try {
                const sheetUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(state.selectedClass)}`;
                const response = await fetch(sheetUrl);
                if (!response.ok) throw new Error("Таблиця не доступна");
                
                const csvData = await response.text();
                state.allStudents = csvData.split('\n')
                    .map(row => row.replace(/"/g, '').trim())
                    .filter(name => name.length > 0 && !name.toLowerCase().includes("ім'я"));

                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'lessons', `${state.selectedClass}_th_${state.selectedTheme}`);
                
                state.unsubscribe = onSnapshot(docRef, (docSnap) => {
                    state.answeredStudents = docSnap.exists() ? (docSnap.data().answered || []) : [];
                    state.pendingStudents = state.allStudents.filter(n => !state.answeredStudents.includes(n));
                    state.view = 'wheel';
                    render();
                });
            } catch (e) {
                alert("Помилка: " + e.message);
                state.view = 'menu';
                render();
            }
        }

        // ЛОГІКА КОЛЕСА
        window.spin = function() {
            if (state.isSpinning || state.pendingStudents.length === 0) return;
            state.isSpinning = true;
            const extraDegrees = Math.floor(Math.random() * 360) + 1800;
            state.currentRotation += extraDegrees;
            
            const wheelElem = document.getElementById('wheel');
            wheelElem.style.transform = `rotate(${state.currentRotation}deg)`;
            
            setTimeout(async () => {
                const actualDegrees = state.currentRotation % 360;
                const sliceAngle = 360 / state.pendingStudents.length;
                const winningIndex = Math.floor(((360 - actualDegrees % 360) % 360) / sliceAngle);
                const winner = state.pendingStudents[winningIndex];
                
                const updatedAnswered = [...state.answeredStudents, winner];
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lessons', `${state.selectedClass}_th_${state.selectedTheme}`), {
                    answered: updatedAnswered
                });

                document.getElementById('winner-name').innerText = winner;
                document.getElementById('winner-modal').style.display = 'flex';
                state.isSpinning = false;
            }, 5000);
        };

        window.resetWheel = async () => {
            if (confirm("Очистити прогрес для цієї теми?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lessons', `${state.selectedClass}_th_${state.selectedTheme}`));
            }
        };

        // РЕНДЕР ІНТЕРФЕЙСУ
        function render() {
            const root = document.getElementById('app-root');
            
            if (state.view === 'menu') {
                root.innerHTML = renderMenu();
            } else if (state.view === 'loading') {
                root.innerHTML = `<div class="flex items-center justify-center h-screen text-2xl font-bold animate-pulse text-blue-600">Завантаження даних...</div>`;
            } else {
                root.innerHTML = renderWheelView();
                drawWheel();
            }
        }

        function renderMenu() {
            let html = `
                <div class="max-w-5xl mx-auto py-12 px-6">
                    <h1 class="text-5xl font-black text-slate-800 mb-12 text-center uppercase tracking-tighter">Журнал опитування</h1>
                    <div class="space-y-12">
            `;

            for (const [grade, classes] of Object.entries(SCHOOL_STRUCTURE)) {
                html += `
                    <section>
                        <h2 class="text-2xl font-bold text-slate-500 mb-6 flex items-center gap-3">
                            <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center text-sm">📁</span>
                            ${grade}
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${classes.map(c => `
                                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                                    <h3 class="text-xl font-black text-slate-800 mb-4">${c} клас</h3>
                                    <div class="grid grid-cols-5 gap-2">
                                        ${Array.from({length: TOTAL_THEMES}).map((_, i) => `
                                            <button onclick="selectWheel('${c}', ${i+1})" 
                                                class="aspect-square flex items-center justify-center rounded-xl bg-slate-50 text-slate-400 font-bold hover:bg-blue-600 hover:text-white transition-all border border-slate-100">
                                                ${i+1}
                                            </button>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `;
            }

            html += `</div></div>`;
            return html;
        }

        function renderWheelView() {
            return `
                <div class="p-6 max-w-[1600px] mx-auto">
                    <header class="flex justify-between items-center mb-8">
                        <button onclick="goBack()" class="bg-white px-6 py-3 rounded-2xl font-bold text-slate-600 shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                            ← Назад до меню
                        </button>
                        <div class="text-center">
                            <h1 class="text-4xl font-black text-slate-800">${state.selectedClass} клас</h1>
                            <p class="text-blue-600 font-bold">Колесо теми №${state.selectedTheme}</p>
                        </div>
                        <button onclick="resetWheel()" class="text-slate-400 text-xs font-bold uppercase tracking-widest hover:text-red-500">
                            Скинути прогрес теми
                        </button>
                    </header>

                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                        <div class="bg-white/50 p-6 rounded-[2rem] border border-white h-[70vh] flex flex-col">
                            <h2 class="font-black text-slate-700 mb-4 uppercase text-sm tracking-wider">Очікують (${state.pendingStudents.length})</h2>
                            <div class="overflow-y-auto space-y-2 flex-1 pr-2">
                                ${state.pendingStudents.map(n => `<div class="bg-white p-3 rounded-xl shadow-sm font-bold text-slate-700 border border-slate-100">${n}</div>`).join('')}
                            </div>
                        </div>

                        <div class="lg:col-span-2 flex flex-col items-center justify-center">
                            <div class="wheel-container">
                                <div class="marker"></div>
                                <div class="center-dot">🎯</div>
                                <div id="wheel"></div>
                            </div>
                            <button onclick="spin()" id="spin-button" ${state.pendingStudents.length === 0 ? 'disabled' : ''} 
                                class="mt-8 bg-blue-600 text-white text-4xl font-black py-8 px-24 rounded-[3rem] shadow-2xl hover:scale-105 active:scale-95 transition-all disabled:opacity-30">
                                КРУТИТИ!
                            </button>
                        </div>

                        <div class="bg-white/50 p-6 rounded-[2rem] border border-white h-[70vh] flex flex-col">
                            <h2 class="font-black text-slate-700 mb-4 uppercase text-sm tracking-wider">Відповіли (${state.answeredStudents.length})</h2>
                            <div class="overflow-y-auto space-y-2 flex-1 pr-2">
                                ${state.answeredStudents.map(n => `<div class="bg-green-50 p-3 rounded-xl font-bold text-green-700 border border-green-100 opacity-60">✓ ${n}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>

                <div id="winner-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl hidden items-center justify-center z-50 p-4" onclick="this.style.display='none'">
                    <div class="bg-white rounded-[4rem] p-12 max-w-lg w-full text-center" onclick="event.stopPropagation()">
                        <div class="text-8xl mb-6">🎓</div>
                        <h3 class="text-xl font-bold text-slate-400 uppercase tracking-widest mb-2">Відповідає</h3>
                        <div id="winner-name" class="text-5xl font-black text-blue-600 mb-10 leading-tight"></div>
                        <button onclick="document.getElementById('winner-modal').style.display='none'" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-2xl">ГОТОВО</button>
                    </div>
                </div>
            `;
        }

        function drawWheel() {
            const wheel = document.getElementById('wheel');
            if (!wheel || state.pendingStudents.length === 0) return;
            
            const total = state.pendingStudents.length;
            const sliceAngle = 360 / total;
            let gradient = "conic-gradient(";
            state.pendingStudents.forEach((name, i) => {
                gradient += `${colors[i % colors.length]} ${i * sliceAngle}deg ${(i + 1) * sliceAngle}deg${i === total - 1 ? '' : ','}`;
            });
            wheel.style.background = gradient + ")";
            
            state.pendingStudents.forEach((name, i) => {
                const label = document.createElement('div');
                label.className = 'slice-label';
                label.style.transform = `translate(-100%, -50%) rotate(${i * sliceAngle + (sliceAngle / 2)}deg) translate(220px)`;
                label.innerText = name.length > 15 ? name.substring(0, 12) + '..' : name;
                wheel.appendChild(label);
            });
        }

        window.onload = startApp;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; min-height: 100vh; color: #1e293b; }
        .wheel-container { position: relative; width: 500px; height: 500px; filter: drop-shadow(0 30px 60px rgba(0,0,0,0.15)); }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 12px solid #fff; position: relative; overflow: hidden; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .marker { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 50px; height: 55px; background: #ef4444; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 30; }
        .center-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: white; border: 4px solid #f1f5f9; border-radius: 50%; z-index: 40; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .slice-label { color: white; font-weight: 800; font-size: 1rem; position: absolute; top: 50%; left: 50%; transform-origin: right center; width: 180px; text-align: right; pointer-events: none; }
    </style>
</head>
<body>
    <div id="app-root"></div>
</body>
</html>
