<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо вибору учнів - Smart Board Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .wheel-container {
            position: relative;
            width: 500px; /* Збільшено для смарт-дошки */
            height: 500px;
            margin: 1rem auto;
            filter: drop-shadow(0 25px 50px rgba(0,0,0,0.2));
        }

        /* Адаптація під мобільні, якщо вчитель відкриє з телефона */
        @media (max-width: 640px) {
            .wheel-container {
                width: 300px;
                height: 300px;
            }
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 15px solid #ffffff;
            position: relative;
            overflow: hidden;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            background-color: #fff;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        .marker {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 65px;
            background: #ef4444;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: white;
            border: 6px solid #334155;
            border-radius: 50%;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            font-size: 2.5rem;
        }

        .slice-label {
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            white-space: nowrap;
            pointer-events: none;
            width: 180px;
            text-align: right;
            transform-origin: right center;
        }

        .list-container {
            max-height: 60vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #94a3b8 transparent;
        }

        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            z-index: 100;
            pointer-events: none;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div class="flex-1 text-center">
                <h1 class="text-4xl md:text-5xl font-black text-slate-800 tracking-tight">🎡 Колесо Фортуни</h1>
                <p class="text-slate-600 font-bold text-lg mt-2">Smart Board Edition</p>
            </div>
            <button onclick="toggleFullscreen()" class="bg-white/50 hover:bg-white p-3 rounded-2xl transition-all shadow-sm border border-slate-200" title="На весь екран">
                <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
            
            <!-- Ліва колонка: Список -->
            <div class="lg:col-span-1 card-glass p-6 rounded-[2.5rem] shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black flex items-center gap-2 text-slate-800">
                        <span class="w-4 h-4 bg-blue-500 rounded-full animate-pulse"></span>
                        Клас
                    </h2>
                    <span id="pending-count" class="text-lg bg-blue-600 text-white py-1 px-4 rounded-full font-black shadow-lg">0</span>
                </div>
                
                <div class="space-y-3 mb-4">
                    <div class="flex gap-2">
                        <input type="text" id="student-input" placeholder="Ім'я..." class="flex-1 px-4 py-3 bg-slate-100 border-none rounded-2xl focus:ring-4 focus:ring-blue-200 text-lg transition-all font-medium">
                        <button onclick="addStudent()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 rounded-2xl transition shadow-lg shadow-blue-200 font-black">✚</button>
                    </div>
                    <button onclick="toggleBulkInput()" class="w-full py-3 border-2 border-dashed border-blue-200 rounded-2xl text-blue-600 hover:bg-blue-50 transition-all text-sm font-black uppercase tracking-wider">
                        📋 Додати список
                    </button>
                </div>

                <div id="bulk-input-container" class="hidden mb-4 space-y-2 animate-in slide-in-from-top-4 duration-300">
                    <textarea id="bulk-textarea" placeholder="Кожне ім'я з нового рядка..." class="w-full h-40 p-4 bg-slate-50 border-2 border-blue-100 rounded-2xl focus:ring-4 focus:ring-blue-200 text-base" spellcheck="false"></textarea>
                    <div class="flex gap-2">
                        <button onclick="addBulkStudents()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl font-black transition shadow-lg shadow-green-100">ЗБЕРЕГТИ</button>
                        <button onclick="toggleBulkInput()" class="px-5 py-3 bg-slate-200 text-slate-600 rounded-2xl font-bold">✕</button>
                    </div>
                </div>

                <div class="list-container pr-2" id="pending-list"></div>
                
                <div class="mt-6 pt-4 border-t border-slate-200 flex justify-center">
                    <button onclick="clearAll()" class="text-slate-400 hover:text-red-500 text-xs transition uppercase tracking-[0.2em] font-black">Очистити все</button>
                </div>
            </div>

            <!-- Центральна колонка: Колесо -->
            <div class="lg:col-span-2 flex flex-col items-center">
                <div class="wheel-container">
                    <div class="marker"></div>
                    <div class="center-dot">
                        <span id="center-emoji">😊</span>
                    </div>
                    <div id="wheel"></div>
                </div>
                
                <div class="w-full max-w-md space-y-6">
                    <button id="spin-button" onclick="spin()" class="w-full bg-gradient-to-br from-indigo-600 via-blue-600 to-indigo-700 hover:from-indigo-500 hover:to-blue-500 text-white text-4xl font-black py-8 px-12 rounded-[3rem] shadow-[0_20px_50px_rgba(37,99,235,0.4)] transition-all hover:scale-[1.03] active:scale-95 disabled:opacity-50 disabled:grayscale">
                        КРУТИТИ!
                    </button>
                    
                    <div id="status-hint" class="text-slate-500 text-xl font-bold text-center h-8 animate-bounce"></div>
                </div>
            </div>

            <!-- Права колонка: Історія -->
            <div class="lg:col-span-1 card-glass p-6 rounded-[2.5rem] shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black flex items-center gap-2 text-slate-800">
                        <span class="w-4 h-4 bg-green-500 rounded-full"></span>
                        Відповіли
                    </h2>
                    <span id="answered-count" class="text-lg bg-green-600 text-white py-1 px-4 rounded-full font-black shadow-lg">0</span>
                </div>

                <div class="list-container pr-2" id="answered-list"></div>

                <div class="mt-6 pt-4 border-t border-slate-200">
                    <button onclick="resetProgress()" class="w-full py-4 bg-white hover:bg-indigo-50 text-indigo-700 border-2 border-indigo-100 rounded-[2rem] text-sm font-black transition-all shadow-sm flex items-center justify-center gap-2 uppercase tracking-wider">
                        🔄 Повернути всіх
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Модальне вікно переможця -->
    <div id="winner-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[4rem] p-12 max-w-lg w-full text-center shadow-[0_0_100px_rgba(79,70,229,0.4)] border-8 border-indigo-50 animate-in fade-in zoom-in duration-500">
            <div class="text-[8rem] mb-6 leading-none">🎓</div>
            <h3 class="text-2xl font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Відповідає</h3>
            <div id="winner-name" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-600 mb-10 leading-tight"></div>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-2xl hover:bg-indigo-600 transition-all shadow-xl">ТАК!</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playClickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playWinnerSound() {
            const notes = [261.63, 329.63, 392.00, 523.25, 659.25];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.8);
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.8);
            });
        }

        let students = [];
        let answered = [];
        let isSpinning = false;
        let currentRotation = 0;

        const colors = [
            '#4f46e5', '#ef4444', '#10b981', '#f59e0b', 
            '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4',
            '#14b8a6', '#f97316', '#6366f1', '#d946ef'
        ];

        const emojis = ['😊', '🤩', '🧐', '😎', '😜', '😇', '🤔'];

        function init() {
            renderLists();
            renderWheel();
            document.getElementById('student-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addStudent();
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function toggleBulkInput() {
            const container = document.getElementById('bulk-input-container');
            container.classList.toggle('hidden');
            if (!container.classList.contains('hidden')) {
                document.getElementById('bulk-textarea').focus();
            }
        }

        function addBulkStudents() {
            const textarea = document.getElementById('bulk-textarea');
            const lines = textarea.value.split('\n');
            let addedCount = 0;

            lines.forEach(line => {
                const name = line.trim();
                if (name && !students.includes(name) && !answered.includes(name)) {
                    students.push(name);
                    addedCount++;
                }
            });

            if (addedCount > 0) {
                textarea.value = '';
                toggleBulkInput();
                updateUI();
            }
        }

        function addStudent() {
            const input = document.getElementById('student-input');
            const name = input.value.trim();
            if (name && !students.includes(name) && !answered.includes(name)) {
                students.push(name);
                input.value = '';
                updateUI();
            }
        }

        function removeStudent(name, listType) {
            if (listType === 'pending') {
                students = students.filter(s => s !== name);
            } else {
                answered = answered.filter(s => s !== name);
            }
            updateUI();
        }

        function updateUI() {
            renderLists();
            renderWheel();
            document.getElementById('pending-count').innerText = students.length;
            document.getElementById('answered-count').innerText = answered.length;
            document.getElementById('spin-button').disabled = students.length === 0;
            
            const hint = document.getElementById('status-hint');
            if (students.length === 0 && answered.length > 0) {
                hint.innerText = "Всі учні відповіли! ✨";
            } else {
                hint.innerText = "";
            }
        }

        function renderLists() {
            const pList = document.getElementById('pending-list');
            const aList = document.getElementById('answered-list');

            pList.innerHTML = students.map(name => `
                <div class="student-item flex justify-between items-center bg-white/50 p-4 rounded-2xl mb-3 shadow-sm border border-white group">
                    <span class="font-bold text-slate-800 text-lg truncate mr-2">${name}</span>
                    <button onclick="removeStudent('${name}', 'pending')" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            `).join('');

            aList.innerHTML = answered.map(name => `
                <div class="student-item flex justify-between items-center bg-green-50 p-4 rounded-2xl mb-3 border border-green-100 shadow-sm opacity-70">
                    <span class="font-bold text-green-700 text-lg truncate mr-2">${name}</span>
                    <div class="flex items-center gap-2">
                        <span class="text-green-500 font-black">✓</span>
                        <button onclick="removeStudent('${name}', 'answered')" class="text-green-200 hover:text-red-500 transition-all">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function renderWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            
            if (students.length === 0) {
                wheel.style.backgroundColor = '#f8fafc';
                wheel.innerHTML = '<div class="absolute inset-0 flex flex-col items-center justify-center text-slate-300 font-black px-12 text-center uppercase tracking-widest"><span class="text-6xl mb-4 opacity-50">✏️</span>Додайте учнів для початку</div>';
                return;
            }

            const total = students.length;
            const sliceAngle = 360 / total;

            let conicGradient = "conic-gradient(";
            students.forEach((name, i) => {
                const start = (i * sliceAngle).toFixed(2);
                const end = ((i + 1) * sliceAngle).toFixed(2);
                conicGradient += `${colors[i % colors.length]} ${start}deg ${end}deg${i === students.length - 1 ? '' : ','}`;
            });
            conicGradient += ")";
            wheel.style.background = conicGradient;

            students.forEach((name, i) => {
                const label = document.createElement('div');
                label.className = 'slice-label';
                const rotation = i * sliceAngle + (sliceAngle / 2);
                label.style.position = 'absolute';
                label.style.top = '50%';
                label.style.left = '50%';
                // Коригуємо позицію тексту для великого колеса
                label.style.transform = `translate(-100%, -50%) rotate(${rotation}deg) translate(220px)`;
                label.innerText = name.length > 15 ? name.substring(0, 13) + '...' : name;
                wheel.appendChild(label);
            });
        }

        function spin() {
            if (isSpinning || students.length === 0) return;
            
            if (audioCtx.state === 'suspended') audioCtx.resume();

            isSpinning = true;
            const wheel = document.getElementById('wheel');
            const spinBtn = document.getElementById('spin-button');
            spinBtn.disabled = true;

            document.getElementById('center-emoji').innerText = '🤩';
            
            const totalSlices = students.length;
            const sliceAngle = 360 / totalSlices;
            
            const extraDegrees = Math.floor(Math.random() * 360);
            const totalSpin = 1800 + extraDegrees;
            currentRotation += totalSpin;

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Імітація звуку клацання
            let clickCount = 0;
            const totalTicks = 40;
            const tickTimer = setInterval(() => {
                clickCount++;
                playClickSound();
                if (clickCount >= totalTicks) clearInterval(tickTimer);
            }, 100);

            setTimeout(() => {
                const actualDegrees = currentRotation % 360;
                const winningIndex = Math.floor(((360 - actualDegrees % 360) % 360) / sliceAngle);
                
                const winner = students[winningIndex];
                showWinner(winner);
                
                isSpinning = false;
                spinBtn.disabled = false;
                document.getElementById('center-emoji').innerText = emojis[Math.floor(Math.random() * emojis.length)];
            }, 5000);
        }

        function showWinner(name) {
            const modal = document.getElementById('winner-modal');
            const winnerNameDisplay = document.getElementById('winner-name');
            winnerNameDisplay.innerText = name;
            modal.style.display = 'flex';
            
            playWinnerSound();
            createConfetti();

            setTimeout(() => {
                moveToAnswered(name);
            }, 500);
        }

        function closeModal() {
            document.getElementById('winner-modal').style.display = 'none';
        }

        function moveToAnswered(name) {
            if (students.includes(name)) {
                students = students.filter(s => s !== name);
                answered.push(name);
                updateUI();
            }
        }

        function resetProgress() {
            if (answered.length === 0) return;
            students = [...students, ...answered];
            answered = [];
            updateUI();
        }

        function clearAll() {
            if (confirm('Очистити список повністю?')) {
                students = [];
                answered = [];
                updateUI();
            }
        }

        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetto = document.createElement('div');
                confetto.className = 'confetti';
                confetto.style.left = Math.random() * 100 + 'vw';
                confetto.style.top = '-10px';
                confetto.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetto.style.width = Math.random() * 15 + 8 + 'px';
                confetto.style.height = Math.random() * 15 + 8 + 'px';
                confetto.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                document.body.appendChild(confetto);

                const animation = confetto.animate([
                    { transform: `translateY(0) rotate(0)`, opacity: 1 },
                    { transform: `translateY(100vh) rotate(${Math.random() * 1000}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2000 + 2000,
                    easing: 'cubic-bezier(.1, .8, .4, 1)'
                });

                animation.onfinish = () => confetto.remove();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
